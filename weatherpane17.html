 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Advanced Weather Dashboard</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#07111f;
  color:white;
  font-family:Arial,sans-serif;
  overflow:hidden;
  height:100vh;
}

.dashboard{
  display:grid;
  grid-template-rows:70px 1fr 190px;
  gap:10px;
  padding:10px;
  height:100vh;
}

.header{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;

  display:grid;
  grid-template-columns:minmax(0,1fr) 46px;
  gap:10px;
  align-items:center;

  padding:8px 10px 8px 16px;
}

.header-main{
  min-width:0;
  cursor:pointer;
}

.header-view{
  display:none;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  min-width:0;
  width:100%;
  white-space:nowrap;
}

.header-view.active{
  display:flex;
}

.header-overview.active{
  display:grid;
  grid-template-columns:
    minmax(78px,0.5fr)
    minmax(190px,2.1fr)
    minmax(64px,0.55fr)
    minmax(48px,0.4fr)
    minmax(48px,0.4fr)
    minmax(120px,1fr);
  align-items:center;
  column-gap:22px;
}

.header-conditions.active{
  display:grid;
  grid-template-columns:repeat(5,minmax(76px,1fr));
  align-items:center;
  column-gap:18px;
}

.header-primary{
  display:flex;
  align-items:baseline;
  gap:20px;
  min-width:0;
}

.header-location{
  font-size:24px;
  font-weight:800;
  line-height:1;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  min-width:0;
}

.header-temp{
  font-size:30px;
  font-weight:900;
  line-height:1;
}

.header-secondary{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:18px;
  flex:0 0 auto;
}

.header-secondary .metric-value{
  opacity:0.88;
}

.header-overview .metric{
  text-align:left;
}

.header-overview .header-temp,
.header-overview .metric:nth-last-child(-n + 3){
  text-align:center;
}

.header-weather-summary{
  text-align:right;
}

.header-support-metric .metric-value,
.header-weather-summary .metric-value{
  font-size:18px;
  opacity:0.86;
}

.header-weather-summary .metric-value{
  overflow:hidden;
  text-overflow:ellipsis;
}

.setup-indicator{
  width:36px;
  height:36px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:white;
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.setup-indicator:hover{
  background:rgba(255,255,255,0.18);
}

.metric{
  text-align:center;
  min-width:0;
}

.metric-label{
  font-size:12px;
  opacity:0.7;
  white-space:nowrap;
}

.metric-value{
  font-size:20px;
  font-weight:bold;
  white-space:nowrap;
}

.main{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  min-height:0;
}

.panel{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  overflow:hidden;
  min-height:0;
}

.map-panel{
  position:relative;
}

#map{
  width:100%;
  height:100%;
}

.cloud-tile-layer{
  filter:brightness(1.08) contrast(1.75) saturate(0.65);
  mix-blend-mode:normal;
}

.location-crosshair{
  width:27px;
  height:27px;
  position:relative;
}

.location-crosshair::before,
.location-crosshair::after{
  content:"";
  position:absolute;
  background:#ff1f1f;
  border-radius:2px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.9),
    0 0 7px rgba(255,31,31,0.95),
    0 0 12px rgba(0,0,0,0.85);
}

.location-crosshair::before{
  left:12px;
  top:0;
  width:3px;
  height:27px;
}

.location-crosshair::after{
  left:0;
  top:12px;
  width:27px;
  height:3px;
}

#radarCountdown{
  position:absolute;
  top:12px;
  right:12px;

  z-index:2000;

  background:rgba(7,17,31,0.82);

  border:1px solid rgba(255,255,255,0.12);

  backdrop-filter:blur(6px);

  padding:6px 10px;

  border-radius:10px;

  font-size:12px;
  font-weight:600;

  color:white;

  letter-spacing:0.4px;

  pointer-events:none;

  box-shadow:0 4px 14px rgba(0,0,0,0.35);
}

.charts{
  display:grid;

  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;

  gap:10px;
  padding:10px;

  height:100%;
  min-height:0;
}

.chart-card{
  background:rgba(255,255,255,0.05);
  border-radius:14px;
  padding:10px;

  display:flex;
  flex-direction:column;

  min-height:0;
}

.chart-title{
  font-size:13px;
  margin-bottom:6px;
  opacity:0.9;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
}

.chart-title > span:first-child{
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.chart-title-actions{
  display:flex;
  align-items:center;
  gap:6px;
  flex:0 0 auto;
}

.chart-next-label{
  min-width:34px;
  padding:2px 6px;
  border:1px solid rgba(255,255,255,0.16);
  border-radius:6px;
  background:rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.76);
  font-size:10px;
  font-weight:bold;
  line-height:1.4;
  text-align:center;
}

.chart-expand-btn{
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);
  color:white;
  width:20px;
  height:20px;
  border-radius:4px;
  font-size:12px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all 0.2s;
  opacity:0.7;
}

.chart-expand-btn:hover{
  background:rgba(255,255,255,0.2);
  border-color:rgba(255,255,255,0.3);
  opacity:1;
}

.chart-container{
  position:relative;
  flex:1;
  min-height:0;
}

.forecast-strip{
  display:grid;
  gap:10px;
  height:100%;
}

.forecast-card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  padding:8px;
  cursor:pointer;
}

.forecast-card:hover{
  background:rgba(255,255,255,0.09);
}

.forecast-layout{
  display:grid;
  grid-template-columns:minmax(0,1fr) 46px;
  gap:10px;
  height:100%;
}

.forecast-panel-stack{
  min-width:0;
  height:100%;
}

.forecast-toggle-btn{
  width:46px;
  height:100%;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:bold;
}

.forecast-toggle-btn:hover{
  background:rgba(255,255,255,0.18);
}

.forecast-day{
  opacity:0.7;
  margin-bottom:4px;
  font-size:13px;
}

.forecast-icon{
  font-size:24px;
  margin-bottom:4px;
}

.forecast-summary{
  font-size:10px;
  text-align:center;
  opacity:0.85;
  min-height:28px;
  line-height:1.2;
  margin-bottom:4px;
}

.forecast-temp{
  font-size:18px;
  font-weight:bold;
}

.forecast-low{
  font-size:11px;
  opacity:0.7;
  margin-top:2px;
}

.forecast-daily-meta{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:1px;
  line-height:1.15;
}

.forecast-daily-meta span{
  display:block;
}

.forecast-daily-precip{
  color:rgba(255,255,255,0.86);
}

.forecast-precip{
  width:100%;
  margin-top:4px;
  padding-top:4px;
  border-top:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.78);
  font-size:10px;
  line-height:1.15;
  text-align:center;
  white-space:normal;
}

.forecast-hourly-card .forecast-precip{
  margin-top:5px;
  font-size:10px;
}

canvas{
  width:100% !important;
  height:100% !important;
}

.zip-search{
  display:flex;
  align-items:center;
  gap:6px;
}

.chart-span-control{
  display:flex;
  align-items:center;
  gap:6px;
  flex:0 0 auto;
}

.chart-span-control label{
  font-size:12px;
  opacity:0.7;
  white-space:nowrap;
}

.chart-span-control select{
  height:36px;
  border-radius:10px;
  border:none;
  padding:0 28px 0 10px;
  background:#1a2433;
  color:white;
  outline:none;
  cursor:pointer;
}

.zip-search input{
  width:90px;
  height:36px;
  border-radius:10px;
  border:none;
  padding:0 10px;
  background:#1a2433;
  color:white;
  outline:none;
}

.zip-search button{
  height:36px;
  padding:0 14px;
  border:none;
  border-radius:10px;
  background:#33d1ff;
  color:#07111f;
  font-weight:bold;
  cursor:pointer;
}

.settings-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:9000;
  align-items:flex-start;
  justify-content:center;
  padding-top:84px;
  backdrop-filter:blur(4px);
}

.settings-overlay.active{
  display:flex;
}

.settings-popup{
  width:min(420px, calc(100vw - 28px));
  background:rgba(10,24,43,0.96);
  border:1px solid rgba(255,255,255,0.14);
  border-radius:16px;
  padding:16px;
  box-shadow:0 18px 48px rgba(0,0,0,0.45);
}

.settings-title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:14px;
}

.settings-title span{
  font-size:15px;
  font-weight:bold;
}

.settings-close{
  width:30px;
  height:30px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
  font-size:18px;
}

.settings-field{
  display:grid;
  grid-template-columns:105px 1fr;
  gap:12px;
  align-items:center;
  margin-top:12px;
}

.settings-field > label{
  font-size:12px;
  opacity:0.72;
}

.settings-field .chart-span-control,
.settings-field .zip-search{
  width:100%;
}

.settings-field .chart-span-control select{
  width:100%;
}

.settings-field .zip-search input{
  flex:1;
  width:auto;
}

.modal-overlay{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  z-index:10000;
  backdrop-filter:blur(4px);
}

.modal-overlay.active{
  display:flex;
  justify-content:center;
  align-items:center;
}

.modal-content{
  position:relative;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:18px;
  padding:20px;
  width:90%;
  height:80%;
  max-width:1200px;
}

.modal-close-btn{
  position:absolute;
  top:12px;
  right:12px;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);
  color:white;
  width:36px;
  height:36px;
  border-radius:8px;
  font-size:20px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10001;
  transition:all 0.2s;
}

.modal-close-btn:hover{
  background:rgba(255,255,255,0.2);
  border-color:rgba(255,255,255,0.3);
}

#modalCanvas{
  width:100% !important;
  height:100% !important;
}

.day-modal-content{
  width:min(520px, calc(100vw - 28px));
  height:auto;
  max-width:520px;
  padding:18px;
}

.day-detail-title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  padding-right:40px;
  margin-bottom:16px;
}

.day-detail-title h2{
  font-size:22px;
  line-height:1;
}

.day-detail-summary{
  font-size:13px;
  opacity:0.78;
  text-transform:capitalize;
  margin-top:5px;
}

.day-detail-temp{
  font-size:34px;
  font-weight:900;
}

.day-detail-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.day-detail-item{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;
  padding:10px;
}

.day-detail-label{
  font-size:11px;
  opacity:0.65;
  margin-bottom:5px;
}

.day-detail-value{
  font-size:17px;
  font-weight:bold;
}

@media(max-width:1100px){

  .dashboard{
    grid-template-rows:70px 1fr 160px;
  }

  .header{
    padding:8px 9px 8px 12px;
  }

  .header-view{
    gap:10px;
  }

  .header-overview.active{
    grid-template-columns:
      minmax(70px,0.55fr)
      minmax(150px,1.8fr)
      minmax(58px,0.55fr)
      minmax(42px,0.4fr)
      minmax(42px,0.4fr)
      minmax(104px,1fr);
    column-gap:12px;
  }

  .header-conditions.active{
    column-gap:10px;
  }

  .header-location{
    font-size:21px;
  }

  .header-temp{
    font-size:27px;
  }

  .metric-label{
    font-size:10px;
  }

  .metric-value{
    font-size:16px;
  }

  .header-support-metric .metric-value,
  .header-weather-summary .metric-value{
    font-size:15px;
  }

  .metric-time .metric-value{
    font-size:18px;
  }

  .header-weather-summary{
    max-width:150px;
  }

  .setup-indicator{
    width:34px;
    height:34px;
  }

  .forecast-summary{
    display:none;
  }

  .forecast-card{
    padding:6px 5px;
  }

  .forecast-icon{
    margin-bottom:2px;
  }

  .forecast-daily-meta{
    margin-top:3px;
  }


  .chart-span-control select,
  .zip-search input,
  .zip-search button{
    height:32px;
  }

  .zip-search input{
    width:76px;
  }

  .zip-search button{
    padding:0 10px;
  }

}

@media(max-width:900px){

  .dashboard{
    grid-template-rows:70px 1fr 160px;
  }

  .header-view{
    gap:8px;
  }

  .header-overview.active{
    grid-template-columns:
      minmax(58px,0.55fr)
      minmax(92px,1.45fr)
      minmax(46px,0.5fr)
      minmax(34px,0.35fr)
      minmax(34px,0.35fr)
      minmax(70px,0.8fr);
    column-gap:7px;
  }

  .header-conditions.active{
    grid-template-columns:repeat(5,minmax(48px,1fr));
    column-gap:5px;
  }

  .header-location{
    font-size:17px;
  }

  .header-temp{
    font-size:23px;
  }

  .metric-time .metric-value{
    font-size:15px;
  }

  .metric-label{
    overflow:hidden;
    text-overflow:ellipsis;
    font-size:9px;
  }

  .metric-value{
    font-size:13px;
  }

  .header-support-metric .metric-value,
  .header-weather-summary .metric-value{
    font-size:12px;
  }

  .header-weather-summary{
    max-width:86px;
  }

  .main{
    grid-template-columns:1fr;
    grid-template-rows:minmax(180px,0.8fr) minmax(280px,1fr);
  }

  .map-panel{
    min-height:180px;
  }

  .forecast-strip{
    gap:5px;
  }

  .forecast-card{
    padding:5px 3px;
    border-radius:12px;
  }

  .forecast-day{
    font-size:10px;
    margin-bottom:2px;
  }

  .forecast-icon{
    font-size:19px;
    margin-bottom:2px;
  }

  .forecast-summary{
    display:none;
  }

  .forecast-temp{
    font-size:15px;
  }

  .forecast-low,
  .forecast-precip{
    font-size:9px;
  }

  .forecast-toggle-btn{
    width:38px;
    font-size:11px;
  }

  .forecast-layout{
    grid-template-columns:minmax(0,1fr) 38px;
    gap:6px;
  }

}

</style>
</head>

<body>

<div class="dashboard">

  <div
    class="header"
  >

    <div
      class="header-main"
      onclick="toggleHeaderMode()"
      title="Toggle current weather details"
    >

      <div
        class="header-view header-overview active"
        id="headerOverview"
      >

        <div class="metric metric-time">
          <div class="metric-label">Local Time</div>
          <div class="metric-value" id="timeMetric">--:--</div>
        </div>

        <div
          class="header-location"
          id="locationMetric"
        >
          Wake Forest, NC
        </div>

        <div
          class="header-temp"
          id="tempMetric"
        >
          --
        </div>

        <div class="metric header-support-metric">
          <div class="metric-label">High</div>
          <div class="metric-value" id="highMetric">--</div>
        </div>

        <div class="metric header-support-metric">
          <div class="metric-label">Low</div>
          <div class="metric-value" id="lowMetric">--</div>
        </div>

        <div class="metric header-weather-summary">
          <div class="metric-label">Conditions</div>
          <div class="metric-value" id="weatherSummary">Loading</div>
        </div>

      </div>

      <div
        class="header-view header-conditions"
        id="headerConditions"
      >

        <div class="metric">
          <div class="metric-label">Humidity</div>
          <div class="metric-value" id="humidityMetric">--</div>
        </div>

        <div class="metric">
          <div class="metric-label">Pressure</div>
          <div class="metric-value" id="pressureMetric">--</div>
        </div>

        <div class="metric">
          <div class="metric-label">Rain</div>
          <div class="metric-value" id="rainMetric">--</div>
        </div>

        <div class="metric">
          <div class="metric-label">Wind Speed</div>
          <div class="metric-value" id="windSpeedMetric">--</div>
        </div>

        <div class="metric">
          <div class="metric-label">Wind Direction</div>
          <div class="metric-value" id="windDirMetric">--</div>
        </div>

      </div>

    </div>

    <button
      class="setup-indicator"
      onclick="event.stopPropagation(); openSettingsPopup()"
      title="Weather settings"
    >
      ⚙
    </button>

  </div>

  <div class="main">

    <div class="panel map-panel">

      <div id="map"></div>

      <div id="radarCountdown">
        Radar refresh in 5:00
      </div>

    </div>

    <div class="panel charts">

      <!-- TEMP / FEELS LIKE -->

      <div
        class="chart-card"
        onclick="toggleTempFeelsLike()"
        style="cursor:pointer;"
      >

        <div
          class="chart-title"
          id="tempFeelsTitle"
        >
          <span>36h Temp [°F]</span>
          <div class="chart-title-actions">
            <span
              id="tempFeelsNext"
              class="chart-next-label"
              title="Next chart"
            >FL</span>
            <button
              class="chart-expand-btn"
              onclick="event.stopPropagation(); openChartModal(showingTemperature ? 'tempChart' : 'feelsLikeChart')"
              title="Expand chart"
            >
              ⤢
            </button>
          </div>
        </div>

        <div
          id="temperaturePanel"
          class="chart-container"
          style="display:block;"
        >
          <canvas id="tempChart"></canvas>
        </div>

        <div
          id="feelsLikePanel"
          class="chart-container"
          style="display:none;"
        >
          <canvas id="feelsLikeChart"></canvas>
        </div>

      </div>

      <!-- WIND / HUMIDITY -->

      <div
        class="chart-card"
        onclick="toggleWindHumidity()"
        style="cursor:pointer;"
      >

        <div
          class="chart-title"
          id="windHumidityTitle"
        >
          <span>36h Wind [mph]</span>
          <div class="chart-title-actions">
            <span
              id="windHumidityNext"
              class="chart-next-label"
              title="Next chart"
            >HUM</span>
            <button

function formatChartHour(date){

  return date.toLocaleTimeString(
    'en-US',
    {
      hour:'numeric',
      hour12:true
    }
  )
  .replace(' AM','a')
  .replace(' PM','p');

}

function getChartTimeTickLimit(){

  if(window.innerWidth <= 820){

  if(window.innerWidth <= 1100){

    return 6;

  }

  return 8;

}

function getChartTimeFontSize(){

  return window.innerWidth <= 820

  [
    tempChart,
    feelsLikeChart,
    windChart,
    humidityChart,
    pressureChart,
    precipChart,
    rainAmountChart

    if(!chart){

      return;

    }

    chart.options.scales.x.ticks.maxTicksLimit =
      getChartTimeTickLimit();

    chart.options.scales.x.ticks.font.size =
      getChartTimeFontSize();

    chart.update('none');

  });

}

function createChart(
  id,
  data,
  color,
  type='line',
  hourlyData=[]
){

  const labels = [];

  for(let i=0;i<data.length;i++){

    const t = new Date(
      hourlyData[i] && hourlyData[i].dt
        ? hourlyData[i].dt * 1000
        : Date.now() + i * 60 * 60 * 1000
    );

    labels.push(
      formatChartHour(t)
    );

  }

  const chart = new Chart(

    document.getElementById(id),

    {

      type:type,

      data:{

        labels:labels,

        datasets:[{

          data:data,

          borderColor:color,
          backgroundColor:color,

          borderWidth:2,

          tension:0.35,

          fill:false

        }]

      },

      options:{

        responsive:true,
        maintainAspectRatio:false,

        plugins:{
          legend:{
            display:false
          }
        },

        scales:{

          x:{

            ticks:{
              color:'rgba(255,255,255,0.6)',
              font:{
                size:getChartTimeFontSize()
              },
              autoSkip:true,
              maxRotation:0,
              minRotation:0,
              maxTicksLimit:getChartTimeTickLimit()
            },

            grid:{
              color:'rgba(255,255,255,0.05)'
            }

          },

          y:{

            ticks:{
              color:'rgba(255,255,255,0.6)'
            },

            grid:{
              color:'rgba(255,255,255,0.05)'
            }

          }

        }

      }

    }

  );

  // Store chart data for modal
  storeChartData(id, chart);

  return chart;

}

    'Feels Like':'°F',
    'Wind':'mph',
    'Humidity':'%',
    'Pressure':'hPa',
    'Chance of Precipitation':'%',
    'Precipitation Amount':'in',
    'UV Index':'index'

  };

  const label =
    shortMetrics[metric] || metric;

  const unit =

function getWeatherIcon(weatherMain,options={}){

  let icon = '☀️';

  const weather =
    (weatherMain || '').toLowerCase();

  const description =
    (options.description || '').toLowerCase();

  const cloudCover =
    typeof options.clouds === 'number'
      ? options.clouds
      : null;

  const condition =
    `${weather} ${description}`;

  const isNight =
    !!options.isNight;

  if(condition.includes('rain')){

    icon = '🌧️';

  }
  else if(condition.includes('snow')){

    icon = '❄️';

  }
  else if(condition.includes('thunder')){

    icon = '⛈️';

  }
  else if(
    condition.includes('cloud') ||
    condition.includes('sun') ||
    condition.includes('clear') ||
    condition.includes('overcast')
  ){

    icon = getCloudCoverIcon(
      condition,
      cloudCover,
      isNight
    );

  }

  return icon;

}

function getCloudCoverIcon(condition,cloudCover,isNight){

  let cover = cloudCover;

  if(cover === null){

    if(condition.includes('mostly sunny')){

      cover = 20;

    }
    else if(condition.includes('partly sunny')){

      cover = 40;

    }
    else if(condition.includes('partly cloudy')){

      cover = 55;

    }
    else if(condition.includes('mostly cloudy')){

      cover = 80;

    }
    else if(
      condition.includes('overcast') ||
      condition.includes('cloudy')
    ){

      cover = 95;

    }
    else{

      cover = 0;

    }

  }

  if(isNight){

    if(cover >= 85){

      return '☁️';

    }

    if(cover >= 35){

      return '🌙☁️';

    }

    return '🌙';

  }

  if(cover >= 85){

    return '☁️';

  }

  if(cover >= 65){

    return '🌥️';

  }

  if(cover >= 40){

    return '⛅';

  }

  if(cover >= 15){

    return '🌤️';

  }

  return '☀️';

}

function isNightForecastHour(data,hourData){

  const hourTime =
    hourData && hourData.dt
      ? hourData.dt * 1000
      : null;

  if(hourTime){

    const daylightDay =
      data.daily.find(day=>
        day.sunrise &&
        day.sunset &&
        hourTime >= day.sunrise * 1000 &&
        hourTime < day.sunset * 1000
      );

    if(daylightDay){

      return false;

    }

    const hasSunEvents =
      data.daily.some(day=>
        day.sunrise &&
        day.sunset
      );

    if(hasSunEvents){

      return true;

    }

  }

  const hour =
    new Date(hourTime || Date.now()).getHours();

  return hour < 7 || hour >= 19;

}

function degToCompass(deg){

  const dirs = [

    'N','NE','E','SE',

    'S','SW','W','NW'

  ];

  return dirs[
    Math.round(deg / 45) % 8
  ];

}

function mmToInches(mm){

  return (mm || 0) / 25.4;

}

function getPrecipAmountInches(weatherPeriod){

  if(!weatherPeriod){

    return 0;

  }

  if(typeof weatherPeriod.qpf_inches === 'number'){

    return weatherPeriod.qpf_inches;

  }

  const rainMm =
    typeof weatherPeriod.rain === 'number'
      ? weatherPeriod.rain
      : (
        weatherPeriod.rain
          ? weatherPeriod.rain['1h'] || weatherPeriod.rain['3h'] || 0
          : 0
      );

  const snowMm =
    typeof weatherPeriod.snow === 'number'
      ? weatherPeriod.snow
      : (
        weatherPeriod.snow
          ? weatherPeriod.snow['1h'] || weatherPeriod.snow['3h'] || 0
          : 0
      );

  return mmToInches(
    rainMm + snowMm
  );

}

// WEATHER
// ======================================

function googleWeatherUrl(endpoint,lat,lon,params={}){

  const url =
    new URL(
      `https://weather.googleapis.com/v1/${endpoint}:lookup`
    );

  url.searchParams.set(
    'key',
    GOOGLE_WEATHER_API_KEY
  );

  url.searchParams.set(
    'location.latitude',
    lat
  );

  url.searchParams.set(
    'location.longitude',
    lon
  );

  url.searchParams.set(
    'unitsSystem',
    'IMPERIAL'
  );

  Object.entries(params).forEach(([key,value])=>{

    url.searchParams.set(
      key,
      value
    );

  });

  return url.toString();

}

async function fetchGoogleWeather(endpoint,lat,lon,params){

  const response =
    await fetch(
      googleWeatherUrl(endpoint,lat,lon,params)
    );

  if(!response.ok){

    let detail = '';

    try{

      const errorBody =
        await response.json();

      detail =
        errorBody.error && errorBody.error.message
          ? `: ${errorBody.error.message}`
          : '';

    }
    catch(_err){

      detail = '';

    }

    throw new Error(
      `Google Weather API ${endpoint} failed: ${response.status}${detail}`
    );

  }

  return response.json();

}

function conditionText(condition){

  return condition &&
    condition.description &&
    condition.description.text
      ? condition.description.text
      : 'Unknown';

}

function conditionType(condition){

  return condition && condition.type
    ? condition.type.replaceAll('_',' ')
    : conditionText(condition);

}

function temperatureDegrees(value){

  return value && typeof value.degrees === 'number'
    ? value.degrees
    : 0;

}

function precipProbability(value){

  return value &&
    value.probability &&
    typeof value.probability.percent === 'number'
      ? value.probability.percent / 100
      : 0;

}

function precipQuantityInches(value){

  return value &&
    value.qpf &&
    typeof value.qpf.quantity === 'number'
      ? value.qpf.quantity
      : 0;

}

function timestampSeconds(value){

  const time =
    value
      ? new Date(value).getTime()
      : NaN;

  return Number.isNaN(time)
    ? null
    : Math.floor(time / 1000);

}

function normalizeGoogleHour(hour){

  return {

    dt:Math.floor(
      new Date(hour.interval.startTime).getTime() / 1000
    ),
    weather:[
      {
        main:conditionType(hour.weatherCondition),
        description:conditionText(hour.weatherCondition)
      }
    ],
    temp:temperatureDegrees(hour.temperature),
    feels_like:temperatureDegrees(hour.feelsLikeTemperature),
    humidity:hour.relativeHumidity || 0,
    pressure:Math.round(
      hour.airPressure
        ? hour.airPressure.meanSeaLevelMillibars
        : 0
    ),
    uvi:hour.uvIndex || 0,
    pop:precipProbability(hour.precipitation),
    qpf_inches:precipQuantityInches(hour.precipitation),
    wind_speed:hour.wind && hour.wind.speed
      ? hour.wind.speed.value
      : 0,
    wind_deg:hour.wind && hour.wind.direction
      ? hour.wind.direction.degrees
      : 0,
    visibility:hour.visibility && hour.visibility.unit === 'MILES'
      ? hour.visibility.distance * 1609.344
      : 0,
    clouds:hour.cloudCover || 0,
    dew_point:temperatureDegrees(hour.dewPoint)

  };

}

function normalizeGoogleDay(day){

  const dayPart =
    day.daytimeForecast || {};

  const nightPart =
    day.nighttimeForecast || {};

  const sunEvents =
    day.sunEvents || {};

  return {

    dt:Math.floor(
      new Date(day.interval.startTime).getTime() / 1000
    ),
    weather:[
      {
        main:conditionType(dayPart.weatherCondition),
        description:conditionText(dayPart.weatherCondition)
      }
    ],
    temp:{
      max:temperatureDegrees(day.maxTemperature),
      min:temperatureDegrees(day.minTemperature)
    },
    feels_like:{
      day:temperatureDegrees(day.feelsLikeMaxTemperature)
    },
    humidity:dayPart.relativeHumidity || nightPart.relativeHumidity || 0,
    pressure:Math.round(
      dayPart.airPressure
        ? dayPart.airPressure.meanSeaLevelMillibars
        : 0
    ),
    uvi:dayPart.uvIndex || 0,
    pop:Math.max(
      precipProbability(dayPart.precipitation),
      precipProbability(nightPart.precipitation)
    ),
    qpf_inches:
      precipQuantityInches(dayPart.precipitation) +
      precipQuantityInches(nightPart.precipitation),
    wind_speed:dayPart.wind && dayPart.wind.speed
      ? dayPart.wind.speed.value
      : 0,
    wind_deg:dayPart.wind && dayPart.wind.direction
      ? dayPart.wind.direction.degrees
      : 0,
    clouds:dayPart.cloudCover || 0,
    sunrise:timestampSeconds(sunEvents.sunriseTime),
    sunset:timestampSeconds(sunEvents.sunsetTime)

  };

}

function normalizeGoogleWeatherData(current,hourly,daily){

  const hourlyData =
    (hourly.forecastHours || []).map(
      normalizeGoogleHour
    );

  const dailyData =
    (daily.forecastDays || []).map(
      normalizeGoogleDay
    );

  return {

    current:{
      weather:[
        {
          main:conditionType(current.weatherCondition),
          description:conditionText(current.weatherCondition)
        }
      ],
      temp:temperatureDegrees(current.temperature),
      humidity:current.relativeHumidity || 0,
      pressure:Math.round(
        current.airPressure
          ? current.airPressure.meanSeaLevelMillibars
          : 0
      ),
      wind_speed:current.wind && current.wind.speed
        ? current.wind.speed.value
        : 0,
      wind_deg:current.wind && current.wind.direction
        ? current.wind.direction.degrees
        : 0
    },
    hourly:hourlyData,
    daily:dailyData

  };

}

async function loadWeather(lat,lon){

  try{

    if(
      !GOOGLE_WEATHER_API_KEY ||
      GOOGLE_WEATHER_API_KEY === 'YOUR_GOOGLE_MAPS_API_KEY'
    ){

      throw new Error(
        'Add your Google Maps Platform API key to GOOGLE_WEATHER_API_KEY.'
      );

    }

    const [
      current,
      hourly,
      daily
    ] = await Promise.all([

      fetchGoogleWeather(
        'currentConditions',
        lat,
        lon
      ),
      fetchGoogleWeather(
        'forecast/hours',
        lat,
        lon,
        {
          hours:48,
          pageSize:24
        }
      ),
      fetchGoogleWeather(
        'forecast/days',
        lat,
        lon,
        {
          days:8,
          pageSize:8
        }
      )

    ]);

    const data =
      normalizeGoogleWeatherData(
        current,
        hourly,
        daily
      );

    if(!data.hourly.length || !data.daily.length){

      throw new Error(
        'Google Weather API returned incomplete forecast data.'
      );

    }

    document.getElementById(
      'weatherSummary'
    ).innerText =
      data.current.weather[0].description;

    document.getElementById(
      'highMetric'
    ).innerText =
      `${Math.round(data.daily[0].temp.max)}°`;

    document.getElementById(
      'lowMetric'
    ).innerText =
      `${Math.round(data.daily[0].temp.min)}°`;

    document.getElementById(
      'tempMetric'
    ).innerText =
      `${Math.round(data.current.temp)}°`;

    document.getElementById(
      'humidityMetric'
    ).innerText =
      `${data.current.humidity}%`;

    document.getElementById(
      'pressureMetric'
    ).innerText =
      `${data.current.pressure}`;

    document.getElementById(
      'rainMetric'
    ).innerText =
      `${Math.round(
        (data.hourly[0].pop || 0) * 100
      )}%`;

    document.getElementById(
      'windSpeedMetric'
    ).innerText =
      `${Math.round(data.current.wind_speed)} mph`;

    document.getElementById(
      'windDirMetric'
    ).innerText =
      degToCompass(data.current.wind_deg);

    renderCharts(data);

    renderForecast(data);

  }

  catch(err){

    console.error(err);

    document.getElementById(
      'weatherSummary'
    ).innerText =
      err.message || 'Weather unavailable';

    document.getElementById(
      'tempMetric'
    ).innerText =
      '--';

  }

}

    chartHourSpan <= 12

  }

function getAddressComponent(components,type){

  const match =
    components.find(component=>
      component.types.includes(type)
    );

  return match
    ? match.long_name
    : '';

}

function formatGeocodeName(result,zip){

  const components =
    result.address_components || [];

  const city =
    getAddressComponent(
      components,
      'locality'
    ) ||
    getAddressComponent(
      components,
      'postal_town'
    );

  const state =
    getAddressComponent(
      components,
      'administrative_area_level_1'
    );

  if(city && state){

    return `${city}, ${state}`;

  }

  return result.formatted_address || zip;

}

async function geocodeZipCode(zip){

  const url =
    new URL(
      'https://maps.googleapis.com/maps/api/geocode/json'
    );

  url.searchParams.set(
    'address',
    zip
  );

  url.searchParams.set(
    'components',
    'country:US'
  );

  url.searchParams.set(
    'key',
    GOOGLE_WEATHER_API_KEY
  );

  const response =
    await fetch(
      url.toString()
    );

  if(!response.ok){

    throw new Error(
      `Google Geocoding API failed: ${response.status}`
    );

  }

  const data =
    await response.json();

  if(data.status !== 'OK' || !data.results.length){

    throw new Error(
      data.error_message || `No location found for ${zip}`
    );

  }

  const result =
    data.results[0];

  return {

    lat:result.geometry.location.lat,
    lon:result.geometry.location.lng,
    name:formatGeocodeName(result,zip)

  };

}

async function changeZipCode(){

  const zip =
    document.getElementById(
      'zipInput'
    ).value.trim();

  if(!zip){

    return;

  }

  try{

    const geo =
      await geocodeZipCode(zip);

    currentLat = geo.lat;
    currentLon = geo.lon;

    document.getElementById(
      'locationMetric'
    ).innerText =
      geo.name || zip;

    map.setView(
      [geo.lat, geo.lon],
      8
    );

    updateLocationCrosshair(
      geo.lat,
      geo.lon
    );

    await loadWeather(
      geo.lat,
      geo.lon
    );

    closeSettingsPopup();

  }

  catch(err){

    console.log(err);

  }

}

let currentLat = DEFAULT_LOCATION.lat;
let currentLon = DEFAULT_LOCATION.lon;

// ======================================
// WEATHER UPDATE
// ======================================

function startWeatherUpdates(){

  if(weatherUpdateTimer){

    clearInterval(
      weatherUpdateTimer
    );

  }

  weatherUpdateTimer =
    setInterval(()=>{

      loadWeather(currentLat, currentLon);

    }, weatherUpdateIntervalMinutes * 60 * 1000);

}

// ======================================
// LOCAL TIME
// ======================================

function updateLocalTime(){

  document.getElementById(
    'timeMetric'
  ).innerText =
    new Date().toLocaleTimeString(
      'en-US',
      {
        hour:'numeric',
        minute:'2-digit'
      }
    );

}

function startLocalTimeUpdates(){

  updateLocalTime();

  setInterval(()=>{

    updateLocalTime();

  }, 60000);

}

// ======================================
// STARTUP
// ======================================

(async function start(){

  startLocalTimeUpdates();

  let lat =
    DEFAULT_LOCATION.lat;

  let lon =
    DEFAULT_LOCATION.lon;

  if(navigator.geolocation){

    navigator.geolocation.getCurrentPosition(

      async pos=>{

        lat =
          pos.coords.latitude;

        lon =
          pos.coords.longitude;

        currentLat = lat;
        currentLon = lon;

        document.getElementById(
          'locationMetric'
        ).innerText =
          'Current Location';

        map.setView(
          [lat,lon],
          7
        );

        updateLocationCrosshair(
          lat,
          lon
        );

        await loadWeather(
          lat,
          lon
        );

        startWeatherUpdates();

      },

      async ()=>{

        currentLat = lat;
        currentLon = lon;

        updateLocationCrosshair(
          lat,
          lon
        );

        await loadWeather(
          lat,
          lon
        );

        startWeatherUpdates();

      }

    );

  }
  else{

    currentLat = lat;
    currentLon = lon;

    updateLocationCrosshair(
      lat,
      lon
    );

    await loadWeather(
      lat,
      lon
    );

    startWeatherUpdates();

  }

})();

</script>
